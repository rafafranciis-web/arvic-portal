<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arvic Group — Portal do Cliente</title>
    <meta name="description" content="Área exclusiva dos clientes Arvic Group." />
    <link rel="icon" href="assets/brand/arvic-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
              display: ["Plus Jakarta Sans", "ui-sans-serif", "system-ui"],
            },
            colors: {
              ink: { 900: "#000000", 800: "#0a0a0a", 700: "#141414" },
              accent: { 500: "#F29442", 600: "#DB7F2D" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-black text-slate-100 antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <header class="relative px-5 md:px-10 py-5 flex items-center justify-between border-b border-white/[0.05]">
      <div class="flex items-center gap-2.5">
        <img src="assets/brand/arvic-logo-white.png" alt="Arvic Group" class="h-6 md:h-7 w-auto" />
        <div class="font-display font-extrabold tracking-tight text-sm md:text-base">Arvic Group</div>
      </div>
      <div class="text-[9px] md:text-[10px] uppercase tracking-[0.3em] text-white/40" id="dateStamp"></div>
    </header>

    <main class="relative flex-1 grid md:grid-cols-12">
      <!-- ESQUERDA: hero + login -->
      <section class="md:col-span-7 relative px-6 md:px-14 lg:px-20 py-14 md:py-20 flex flex-col justify-center" data-aos="fade-up" data-aos-duration="700">

        <h1 class="font-display font-extrabold text-4xl md:text-5xl lg:text-6xl leading-[1.0] tracking-[-0.03em] min-h-[200px] md:min-h-[260px] lg:min-h-[300px]">
          <span id="heroTypewriter" class="typewriter"></span><br />
          <span id="heroAccent" class="bg-gradient-to-br from-white via-slate-300 to-slate-500 bg-clip-text text-transparent opacity-0 transition-opacity duration-700">em tempo real.</span>
        </h1>

        <p class="mt-5 md:mt-6 font-serif italic text-xl md:text-2xl leading-snug text-slate-300 max-w-xl">
          Uma janela direta para tudo que a Arvic está construindo com você.
        </p>

        <!-- LOGIN integrado ao fluxo -->
        <div id="acesso" class="mt-10 md:mt-12 max-w-sm w-full" data-aos="fade-up" data-aos-delay="200">
          <div class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-4">
            Acesso exclusivo
          </div>
          <form id="loginForm" class="space-y-5">
            <label class="block">
              <span class="text-[10px] uppercase tracking-[0.25em] text-slate-400 block mb-2">Código</span>
              <input
                type="text"
                id="clientCode"
                placeholder="digite seu código"
                autocomplete="off"
                class="w-full bg-transparent border-b border-white/15 px-0 py-2 text-base focus:outline-none focus:border-white/60 transition placeholder:text-white/15"
                required
              />
            </label>
            <label class="block">
              <span class="text-[10px] uppercase tracking-[0.25em] text-slate-400 block mb-2">Senha</span>
              <input
                type="password"
                id="clientPassword"
                class="w-full bg-transparent border-b border-white/15 px-0 py-2 text-base focus:outline-none focus:border-white/60 transition"
                required
              />
            </label>
            <button
              type="submit"
              class="w-full btn-primary rounded-full py-3 px-6 text-sm mt-6"
            >
              Entrar no portal
            </button>
            <div id="loginError" class="text-xs text-red-400 hidden">
              Código ou senha não batem. Confere os dados que a Arvic te enviou.
            </div>
          </form>
        </div>
      </section>

      <!-- DIREITA: logo isolada. Em mobile, fica abaixo. -->
      <aside class="md:col-span-5 relative border-t md:border-t-0 md:border-l border-white/[0.05]" data-aos="fade-left" data-aos-delay="200">
        <div class="relative h-full flex items-center justify-center p-10 md:p-14 min-h-[280px] md:min-h-[600px]">
          <div class="brand-lockup h-40 md:h-64 lg:h-80 w-full max-w-xs md:max-w-none" role="img" aria-label="Arvic Group"></div>
        </div>
      </aside>
    </main>

    <footer class="relative px-5 md:px-10 py-5 text-[9px] md:text-[10px] uppercase tracking-[0.3em] text-white/35 flex items-center justify-between border-t border-white/[0.04]">
      <div>© <span id="year"></span> Arvic Group</div>
      <div class="hidden md:block">Portal Arvic Group</div>
    </footer>

    <script src="js/clients.js"></script>
    <script>
      const _now = new Date();
      document.getElementById("year").textContent = _now.getFullYear();
      const _ds = document.getElementById("dateStamp");
      if (_ds) {
        const dd = String(_now.getDate()).padStart(2, "0");
        const mm = String(_now.getMonth() + 1).padStart(2, "0");
        const yy = String(_now.getFullYear()).slice(2);
        _ds.textContent = `${dd}.${mm}.${yy}`;
      }
      if (window.AOS) AOS.init({ duration: 700, easing: "ease-out-cubic", once: true });

      // Typewriter no headline
      (function () {
        const target = document.getElementById("heroTypewriter");
        const accent = document.getElementById("heroAccent");
        if (!target) return;
        const text = "O trabalho da\nsua marca,";
        let i = 0;
        function type() {
          if (i >= text.length) {
            target.classList.add("done");
            if (accent) accent.classList.remove("opacity-0");
            return;
          }
          const ch = text[i];
          if (ch === "\n") {
            target.innerHTML += "<br />";
          } else {
            target.append(ch);
          }
          i++;
          setTimeout(type, 42 + Math.random() * 30);
        }
        setTimeout(type, 450);
      })();

      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const code = document.getElementById("clientCode").value.trim().toLowerCase();
        const pass = document.getElementById("clientPassword").value;
        const client = window.ARVIC_CLIENTS && window.ARVIC_CLIENTS[code];
        const err = document.getElementById("loginError");
        if (client && client.password === pass) {
          localStorage.setItem("arvic_session_" + code, "1");
          window.location.href = "portal.html?c=" + encodeURIComponent(code);
        } else {
          err.classList.remove("hidden");
          const form = e.currentTarget;
          form.classList.add("shake");
          setTimeout(() => form.classList.remove("shake"), 500);
        }
      });
    </script>
  </body>
</html>
